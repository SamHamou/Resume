{{ define "main" }}
<div class="page-header decorative-header">
    <div class="container">
        <h1 class="page-title">{{ .Title }}</h1>
    </div>
</div>

<div class="container page-content-section">

    <div class="list-grid">
        {{ range .Pages }}
        <a href="{{ .RelPermalink }}" class="list-item">
            <h3 class="list-item-title">{{ .Title }}</h3>
            <p class="list-item-summary">{{ .Summary }}</p>
        </a>
        {{ end }}
    </div>
</div>
{{ end }}
