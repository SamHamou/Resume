{{ define "main" }}
<div class="container">
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Oops! Page Not Found</h2>
            <p>It looks like the garden path you're following has come to a dead end. Let's get you back to the main
                garden.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="/" class="btn btn-primary">Go to Homepage</a>
                <a href="/allotments" class="btn btn-outline"
                    style="color: var(--secondary-color); border-color: var(--secondary-color);">Allotment Info</a>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-outline:hover {
        background: var(--secondary-color) !important;
        color: white !important;
    }
</style>
{{ end }}
